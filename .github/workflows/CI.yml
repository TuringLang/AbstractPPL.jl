name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

jobs:
  test:
    name: test (${{ matrix.runner.version }}, ${{ matrix.runner.os }})
    runs-on: ${{ matrix.runner.os }}
    strategy:
      fail-fast: false
      matrix:
        runner:
          - version: '1'
            os: ubuntu-latest
          - version: 'min'
            os: ubuntu-latest
          - version: '1.11'
            os: ubuntu-latest
          - version: '1'
            os: windows-latest
          - version: '1'
            os: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.runner.version }}
      - uses: julia-actions/cache@v3
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
        env:
          GROUP: Tests
      - uses: julia-actions/julia-processcoverage@v1
      - uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

  ext:
    name: Ext (${{ matrix.label }}, ${{ matrix.version }})
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.label == 'enzyme' }}
    strategy:
      fail-fast: false
      matrix:
        label:
          - forward_diff
          - mooncake
          - enzyme
          - differentiation_interface
          - finite_differences
          - logdensityproblems
        version:
          - '1'
          - 'min'
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
      - uses: julia-actions/cache@v3
      - uses: julia-actions/julia-buildpkg@v1
      - run: julia --project=. test/run_ext_tests.jl
        env:
          LABEL: ${{ matrix.label }}
